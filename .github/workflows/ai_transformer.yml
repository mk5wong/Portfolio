name: AI STAR Transformer
on:
  issues:
    types: [opened, reopened]

jobs:
  transform:
    if: contains(github.event.issue.labels.*.name, 'experience')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Call GitHub AI Model
        id: ai_call
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create safe JSON payload
          JSON_BODY=$(echo "$ISSUE_BODY" | jq -Rsa .)
          
          cat <<EOF > payload.json
          {
            "model": "gpt-4o",
            "messages": [
              {"role": "system", "content": "You are a career coach. Transform the user raw notes into professional STAR format Markdown."},
              {"role": "user", "content": $JSON_BODY}
            ]
          }
          EOF

          # Call API and capture the full response
          curl -v -X POST "https://models.inference.ai.azure.com/chat/completions" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -d @payload.json > response.json
          
          # Print response to logs so we can see what's wrong
          cat response.json
          
          # Extract content
          jq -r '.choices[0].message.content // "AI_ERROR"' response.json > result.md

      - name: Save to Portfolio
        run: |
          mkdir -p _posts
          FILENAME="_posts/exp-${{ github.event.issue.number }}.md"
          # Only save if we actually got a result
          if ! grep -q "AI_ERROR" result.md; then
            mv result.md $FILENAME
            git config user.name "AI-Career-Bot"
            git config user.email "actions@github.com"
            git add .
            git commit -m "New STAR entry for Issue #${{ github.event.issue.number }}"
            git push
          else
            echo "AI failed to generate content. Check the logs above."
            exit 1
          fi
