name: AI STAR Transformer
on:
  issues:
    types: [opened, reopened]

jobs:
  transform:
    if: contains(github.event.issue.labels.*.name, 'experience')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Call GitHub AI Model
        id: ai_call
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create a temporary JSON file to avoid shell escaping issues
          cat <<EOF > payload.json
          {
            "model": "gpt-4o",
            "messages": [
              {"role": "system", "content": "You are a career coach. Transform the user raw notes into professional STAR format Markdown. Use clear headings for Situation, Task, Action, and Result."},
              {"role": "user", "content": $(echo "$ISSUE_BODY" | jq -Rsa .)}
            ]
          }
          EOF

          # Call the API using the file
          RESPONSE=$(curl -s -X POST "https://models.inference.ai.azure.com/chat/completions" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -d @payload.json)
          
          # Extract content and check for errors
          echo "$RESPONSE" | jq -r '.choices[0].message.content' > result.md
          
          if [ "$(cat result.md)" == "null" ]; then
            echo "Error: AI response was empty or invalid"
            echo "$RESPONSE"
            exit 1
          fi

      - name: Save to Portfolio
        run: |
          mkdir -p _posts
          FILENAME="_posts/exp-${{ github.event.issue.number }}.md"
          mv result.md $FILENAME
          git config user.name "AI-Career-Bot"
          git config user.email "actions@github.com"
          git add .
          git commit -m "New STAR entry for Issue #${{ github.event.issue.number }}"
          git push
