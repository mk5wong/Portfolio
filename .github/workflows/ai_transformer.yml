name: AI STAR Transformer
on:
  issues:
    types: [opened, reopened]

jobs:
  transform:
    if: contains(github.event.issue.labels.*.name, 'experience')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Call GitHub AI Model
        id: ai_call
        run: |
          # This calls the GitHub Pro AI endpoint directly
          RESPONSE=$(curl -X POST "https://models.inference.ai.azure.com/chat/completions" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -d '{
              "model": "gpt-4o",
              "messages": [
                {"role": "system", "content": "You are a career coach. Transform the user raw notes into professional STAR format Markdown. Use clear headings for Situation, Task, Action, and Result."},
                {"role": "user", "content": ${{ toJson(github.event.issue.body) }}}
              ]
            }')
          
          # Extract the content from the JSON response and save to a temporary file
          echo "$RESPONSE" | jq -r '.choices[0].message.content' > result.md

      - name: Save to Portfolio
        run: |
          mkdir -p _posts
          FILENAME="_posts/exp-${{ github.event.issue.number }}.md"
          mv result.md $FILENAME
          git config user.name "AI-Career-Bot"
          git config user.email "actions@github.com"
          git add .
          git commit -m "New STAR entry generated for Issue #${{ github.event.issue.number }}"
          git push
